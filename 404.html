<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOOSE</title>
    <meta property="og:title" content="GOOSE — phone-free with friends">
    <meta property="og:description" content="You've been invited to a phone-free session.">
    <meta property="og:type" content="website">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #0a1628 0%, #1a2942 100%);
            color: #e8eef7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            max-width: 420px;
            width: 100%;
            text-align: center;
            padding: 40px 28px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }

        .logo {
            font-family: Georgia, 'Times New Roman', serif;
            font-style: italic;
            font-weight: bold;
            font-size: 44px;
            color: #d4af37;
            text-shadow: 0 0 24px rgba(212, 175, 55, 0.35);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 28px;
            color: #e8eef7;
            line-height: 1.3;
        }

        .label {
            font-size: 11px;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            color: #7e8da6;
            margin-bottom: 8px;
        }

        .code {
            font-family: ui-monospace, 'SF Mono', Menlo, monospace;
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #ffffff;
            margin-bottom: 32px;
        }

        .body-text {
            font-size: 15px;
            line-height: 1.55;
            color: #b8c5d6;
            margin-bottom: 28px;
        }

        .cta {
            display: inline-block;
            background: #d4af37;
            color: #0a1628;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: opacity 0.15s ease;
        }

        .cta:hover, .cta:focus { opacity: 0.85; }
        .cta:active { transform: scale(0.98); }

        .home-link {
            display: inline-block;
            color: #7e8da6;
            text-decoration: none;
            font-size: 14px;
            margin-top: 8px;
        }

        .home-link:hover { color: #b8c5d6; }
    </style>
</head>
<body>
    <main class="card" id="root"></main>
    <script>
        // CTA swap-point. When TestFlight external testing is enabled, replace with:
        //   const INSTALL_CTA = "https://testflight.apple.com/join/XXXXXXXX";
        //   const INSTALL_LABEL = "Install on TestFlight";
        const INSTALL_CTA = "mailto:contact@airgateapp.com?subject=GOOSE%20beta%20access";
        const INSTALL_LABEL = "Request beta access";

        const root = document.getElementById("root");
        const match = window.location.pathname.match(/^\/goose\/join\/([A-Z0-9]{6})\/?$/i);

        if (match) {
            const code = match[1].toUpperCase();
            root.innerHTML = `
                <div class="logo">GOOSE</div>
                <h1>You're invited to a phone-free session</h1>
                <div class="label">Join code</div>
                <div class="code">${code}</div>
                <p class="body-text">GOOSE isn't installed on this phone yet. Install it, then tap this link again — or open GOOSE and enter the code above.</p>
                <a class="cta" href="${INSTALL_CTA}">${INSTALL_LABEL}</a>
            `;
        } else {
            root.innerHTML = `
                <div class="logo">GOOSE</div>
                <h1>Page not found</h1>
                <p class="body-text">This page doesn't exist on airgateapp.com.</p>
                <a class="home-link" href="/">← airgateapp.com</a>
            `;
        }
    </script>
</body>
</html>
